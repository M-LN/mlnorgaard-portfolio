name: Fetch live energy data

on:
  schedule:
    - cron: '*/5 * * * *'   # hvert 5. minut (UTC)
  workflow_dispatch:         # kan også køres manuelt

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PowerSystemRightNow
        run: |
          curl -sf \
            "https://api.energidataservice.dk/dataset/PowerSystemRightNow?start=now-PT3H&sort=Minutes1UTC%20DESC&limit=200" \
            -o data/psrn.json

      - name: Fetch DayAheadPrices
        # 15-min opløsning: start 3 timer tilbage så "nu"-prisen altid findes;
        # limit 400 dækker ca. -3h til +36h for begge prisområder
        run: |
          curl -sf \
            "https://api.energidataservice.dk/dataset/DayAheadPrices?start=now-PT3H&filter=%7B%22PriceArea%22%3A%5B%22DK1%22%2C%22DK2%22%5D%7D&sort=TimeDK%20DESC&limit=400" \
            -o data/prices.json

      - name: Commit hvis data er ændret
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: live energy data $(date -u +%H:%M)"
          git push
