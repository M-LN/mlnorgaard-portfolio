<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Østjylland · Ro-index</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e0c; --bg2:#11140f; --panel:#14180f; --line:#252b20;
    --ink:#e9ede2; --mut:#8a948a; --dim:#5d665a;
    --lime:#c2f53f; --lime-dim:#7e9e36;
    --alert:#e0573c; --warn:#e0a23c;
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:grid; grid-template-rows:auto 1fr auto; height:100vh}
  /* header */
  header{
    display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
    padding:14px 20px; border-bottom:1px solid var(--line); background:var(--bg2);
  }
  header h1{
    font-size:18px; font-weight:600; margin:0; letter-spacing:-.01em;
  }
  header h1 b{color:var(--lime); font-weight:700}
  .sub{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--mut)}
  .tag{
    margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    letter-spacing:.14em; color:var(--bg); background:var(--warn);
    padding:3px 8px; border-radius:4px; font-weight:700; align-self:center;
  }
  /* main split */
  main{display:grid; grid-template-columns:1fr 360px; min-height:0}
  #map{background:var(--bg); height:100%}
  .leaflet-container{background:var(--bg); font-family:'JetBrains Mono',monospace}
  .kpath{stroke:var(--bg); stroke-width:1.5; cursor:pointer; transition:fill-opacity .15s, stroke .15s}
  .kpath:hover{stroke:var(--ink); stroke-width:2}
  .kpath.sel{stroke:var(--lime); stroke-width:2.5}
  .klabel{
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500;
    color:var(--ink); text-shadow:0 1px 3px #000,0 0 2px #000; pointer-events:none;
    white-space:nowrap;
  }
  .klabel b{font-size:13px; font-weight:700}
  .dot{border-radius:50%; border:1.5px solid #000a; box-shadow:0 0 0 1px #fff2}
  /* panel */
  aside{
    border-left:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:16px; min-height:0;
  }
  .gauge{
    display:flex; align-items:center; gap:14px; padding:12px 0 16px;
    border-bottom:1px solid var(--line); margin-bottom:14px;
  }
  .ring{position:relative; width:84px; height:84px; flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{
    position:absolute; inset:0; display:grid; place-items:center;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:26px; line-height:1;
  }
  .gauge .meta .lab{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut); letter-spacing:.06em}
  .gauge .meta .big{font-size:15px; font-weight:600; margin-top:3px}
  .gauge .meta .small{font-size:12px; color:var(--mut); margin-top:4px; font-family:'JetBrains Mono',monospace}
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.16em;
    color:var(--dim); text-transform:uppercase; margin:6px 0 8px;
  }
  /* ranked list */
  .row{
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px;
    padding:9px 8px; border-radius:8px; cursor:pointer; transition:background .12s;
  }
  .row:hover{background:#1c2117}
  .row .chip{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px;
    width:34px; height:26px; display:grid; place-items:center; border-radius:6px; color:#0c0e0c;
  }
  .row .nm{font-size:14px; font-weight:500}
  .row .mini{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut); margin-top:1px}
  .row .arr{color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:14px}
  /* detail */
  .back{
    display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--lime);
    font-family:'JetBrains Mono',monospace; font-size:12px; margin-bottom:10px; user-select:none;
  }
  .back:hover{text-decoration:underline}
  .dhead{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .dhead h2{margin:0; font-size:20px; font-weight:600}
  .dscore{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:22px}
  .stat-line{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--mut); margin:6px 0 14px; line-height:1.5}
  .stat-line b{color:var(--ink)}
  .bar{display:grid; grid-template-columns:78px 1fr 28px; align-items:center; gap:8px; margin:5px 0; font-size:12px}
  .bar .bt{font-family:'JetBrains Mono',monospace; color:var(--mut)}
  .bar .track{height:7px; background:#1d2218; border-radius:4px; overflow:hidden}
  .bar .fill{height:100%; background:var(--lime-dim); border-radius:4px}
  .bar .bn{font-family:'JetBrains Mono',monospace; color:var(--ink); text-align:right; font-size:11px}
  .inc{
    display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:start;
    padding:9px 4px; border-top:1px solid var(--line); cursor:pointer;
  }
  .inc:hover{background:#1a1f15}
  .inc .sev{width:8px; height:8px; border-radius:50%; margin-top:5px}
  .inc .it{font-size:13px; font-weight:500}
  .inc .iw{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut); margin-top:1px}
  .inc .tm{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim)}
  .empty{color:var(--dim); font-size:13px; padding:18px 4px; font-family:'JetBrains Mono',monospace}
  /* sparkline + trend */
  .spark{display:block}
  .row{grid-template-columns:auto 1fr auto auto}
  .row .sp{opacity:.9}
  .gspark{margin:2px 0 0}
  .trend{margin:4px 0 6px; background:#10140d; border:1px solid var(--line); border-radius:8px; padding:10px 8px 6px}
  .trend .tlab{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:.06em; margin:0 4px 6px}
  .trend text{font-family:'JetBrains Mono',monospace; fill:var(--dim); font-size:9px}
  .matur{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--dim); margin:2px 0 12px; display:flex; align-items:center; gap:7px}
  .matur .pill{height:5px; flex:1; max-width:120px; background:#1d2218; border-radius:3px; overflow:hidden}
  .matur .pf{height:100%; background:var(--lime-dim); border-radius:3px}
  /* footer */
  footer{
    border-top:1px solid var(--line); background:var(--bg2);
    padding:9px 20px; display:flex; gap:18px; align-items:center; flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut);
  }
  .scale{display:flex; align-items:center; gap:0}
  .scale .sw{width:22px; height:10px}
  .scale .sl{margin:0 8px 0 4px; color:var(--dim)}
  .note{color:var(--dim)}
  .note b{color:var(--mut); font-weight:500}
  @media (max-width:760px){
    body{overflow:auto}
    .app{height:auto; min-height:100vh}
    main{grid-template-columns:1fr; grid-template-rows:54vh auto}
    aside{border-left:none; border-top:1px solid var(--line)}
    .tag{margin-left:0}
  }
</style>
</head>

    <div id="map"></div>

    <span class="note"><b>Score</b> = afvigelse fra 8-ugers baseline (Poisson, alvorsvægtet). 100 = usædvanligt roligt.</span>
  </footer>
</div>

let DATA;
const NODATA = '#262b20';
</script>
<script>
/* ---------- color scale: busy(red) -> neutral -> calm(lime) ---------- */
const STOPS = [ [0,[216,80,58]],[30,[214,140,70]],[50,[150,150,90]],[70,[140,185,95]],[100,[182,242,74]] ];
function scoreColor(s){
  if(s==null||Number.isNaN(s)) return NODATA;
  s=Math.max(0,Math.min(100,s));
  for(let i=0;i<STOPS.length-1;i++){
    const [a,ca]=STOPS[i],[b,cb]=STOPS[i+1];
    if(s>=a&&s<=b){const t=(s-a)/(b-a);
      return `rgb(${ca.map((v,j)=>Math.round(v+(cb[j]-v)*t)).join(',')})`;}
  }
  return 'rgb(182,242,74)';
}
const SEVCOL={1:'#7d8a6e',2:'#caa84a',3:'#e0a23c',5:'#e0573c'};

/* ---------- vanilla SVG charts ---------- */
function sparkline(scores,w=64,h=20){
  const n=scores.length, pad=2;
  const X=i=>pad+i*(w-2*pad)/(n-1), Y=v=>pad+(1-v/100)*(h-2*pad);
  const segs=[]; let cur=[];
  scores.forEach((v,i)=>{ if(v==null){ if(cur.length){segs.push(cur);cur=[];} } else cur.push([i,v]); });
  if(cur.length) segs.push(cur);
  const lastVal=[...scores].reverse().find(v=>v!=null);
  const c=scoreColor(lastVal==null?null:lastVal);
  const y50=Y(50).toFixed(1);
  const polys=segs.map(s=>`<polyline fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" points="${s.map(([i,v])=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ')}"/>`).join('');
  const li=n-1, dot=scores[li]==null?'':`<circle cx="${X(li).toFixed(1)}" cy="${Y(scores[li]).toFixed(1)}" r="2" fill="${c}"/>`;
  return `<svg class="spark sp" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <line x1="0" y1="${y50}" x2="${w}" y2="${y50}" stroke="#2a3122" stroke-width="1" stroke-dasharray="2 2"/>
    ${polys}${dot}</svg>`;
}
function trendChart(series,w=324,h=110){
  const n=series.length, pad={l:6,r:6,t:8,b:16};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=i=>pad.l+i*iw/(n-1), Y=v=>pad.t+(1-v/100)*ih;
  const scores=series.map(s=>s.score);
  const band=`M${pad.l},${Y(63)} H${w-pad.r} V${Y(37)} H${pad.l} Z`;
  const segs=[]; let cur=[];
  scores.forEach((v,i)=>{ if(v==null){ if(cur.length){segs.push(cur);cur=[];} } else cur.push([i,v]); });
  if(cur.length) segs.push(cur);
  const lastNN=[...scores].reverse().find(v=>v!=null);
  const lc=scoreColor(lastNN==null?null:lastNN);
  const polys=segs.map(s=>`<polyline fill="none" stroke="${lc}" stroke-width="1.8" stroke-linejoin="round" points="${s.map(([i,v])=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ')}"/>`).join('');
  const firstNN=scores.findIndex(v=>v!=null);
  const gap=firstNN>0?`<rect x="${pad.l}" y="${pad.t}" width="${(X(firstNN)-pad.l).toFixed(1)}" height="${ih}" fill="#161a12"/>`:'';
  const li=n-1, dot=scores[li]==null?'':`<circle cx="${X(li).toFixed(1)}" cy="${Y(scores[li]).toFixed(1)}" r="3" fill="${lc}" stroke="#0c0e0c" stroke-width="1.5"/>`;
  const lbl=i=>series[i].d.slice(5).replace('-','/');
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
    ${gap}<path d="${band}" fill="#1a3320" opacity=".5"/>
    <line x1="${pad.l}" y1="${Y(50)}" x2="${w-pad.r}" y2="${Y(50)}" stroke="#2a3122" stroke-width="1"/>
    ${polys}${dot}
    <text x="${pad.l}" y="${h-4}" text-anchor="start">${lbl(0)}</text>
    <text x="${w/2}" y="${h-4}" text-anchor="middle">${lbl(Math.floor(n/2))}</text>
    <text x="${w-pad.r}" y="${h-4}" text-anchor="end">i dag</text>
  </svg>`;
}

/* ---------- map ---------- */
const map=L.map('map',{zoomControl:true,attributionControl:false,minZoom:7,maxZoom:12})
  .setView([56.25,10.25],8.4);
L.control.zoom({position:'bottomright'}).addTo(map);

const byName={};
let selected=null, incLayer=L.layerGroup().addTo(map), labelLayer=L.layerGroup().addTo(map);
const layers={}; let geoLayer=null;
const opac=nm=>(byName[nm]&&byName[nm].score==null)?.4:.82;

function buildGeoLayer(){
  geoLayer=L.geoJSON(GEO,{
    style:f=>{const k=byName[f.properties.name]||{};
      return{className:'kpath',color:'#0c0e0c',weight:1.5,fillColor:scoreColor(k.score),fillOpacity:k.score==null?.4:.82};},
    onEachFeature:(f,layer)=>{
      const nm=f.properties.name; layers[nm]=layer;
      layer.on('mouseover',()=>{if(selected!==nm)layer.setStyle({fillOpacity:.95});});
      layer.on('mouseout',()=>{if(selected!==nm)layer.setStyle({fillOpacity:opac(nm)});});
      layer.on('click',()=>selectKommune(nm));
    }
  }).addTo(map);
}

function drawLabels(){
  labelLayer.clearLayers();
  DATA.kommuner.forEach(k=>{
    const sc=k.score==null?'—':k.score;
    const html=`<div class="klabel">${k.name}<br><b>${sc}</b></div>`;
    L.marker([k.cy,k.cx],{icon:L.divIcon({className:'',html,iconSize:[0,0]}),interactive:false}).addTo(labelLayer);
  });
}

function showIncidents(nm){
  incLayer.clearLayers();
  if(!nm)return;
  DATA.incidents.filter(i=>i.k===nm).forEach(i=>{
    const r=4+i.sev; 
    L.circleMarker([i.y,i.x],{radius:r/1.5+2,className:'dot',color:'#000',weight:1,
      fillColor:SEVCOL[i.sev],fillOpacity:.9})
      .bindTooltip(`${i.type} · ${i.by} · ${i.time}`,{direction:'top'})
      .addTo(incLayer);
  });
}

/* ---------- panel ---------- */
const panel=document.getElementById('panel');
function ring(score,size=84,stroke=8){
  const r=(size-stroke)/2, c=2*Math.PI*r;
  const nd=score==null, off=nd?c:c*(1-score/100);
  return `<div class="ring"><svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1f261a" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${scoreColor(score)}"
      stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg><div class="num" style="color:${scoreColor(score)};font-size:${nd?'20px':'26px'}">${nd?'—':score}</div></div>`;
}
function moodWord(s){if(s==null)return 'Afventer baseline';return s>=75?'Meget roligt':s>=58?'Roligt':s>=42?'Normalt':s>=25?'Travlt':'Meget travlt';}

function renderOverview(){
  selected=null; showIncidents(null);
  Object.entries(layers).forEach(([n,l])=>{l.getElement()?.classList.remove('sel');l.setStyle({fillOpacity:opac(n)});});
  map.flyTo([56.25,10.25],8.4,{duration:.6});
  const d=DATA.district_score;
  const dsp=DATA.district_series.slice(-28).map(s=>s.score);
  const rows=[...DATA.kommuner].sort((a,b)=>(b.score??-1)-(a.score??-1)).map(k=>{
    const sp=DATA.series[k.name].slice(-21).map(s=>s.score);
    return `
    <div class="row" data-k="${k.name}">
      <div class="chip" style="background:${scoreColor(k.score)}${k.score==null?';color:var(--dim)':''}">${k.score==null?'—':k.score}</div>
      <div><div class="nm">${k.name}</div><div class="mini">${k.n} hændelser · ${moodWord(k.score).toLowerCase()}</div></div>
      ${sparkline(sp)}
      <div class="arr">›</div>
    </div>`;}).join('');
  panel.innerHTML=`
    <div class="gauge">${ring(d)}
      <div class="meta"><div class="lab">ØSTJYLLAND I DAG</div>
        <div class="big">${moodWord(d)}</div>
        <div class="small">${DATA.incidents.length} hændelser · ${DATA.kommuner.length} kommuner</div>
        <div class="gspark">${sparkline(dsp,150,22)}</div></div></div>
    <div class="eyebrow">Kommuner · roligst først</div>
    ${rows}`;
  panel.querySelectorAll('.row').forEach(r=>r.onclick=()=>selectKommune(r.dataset.k));
}

function selectKommune(nm){
  selected=nm; const k=byName[nm];
  Object.entries(layers).forEach(([n,l])=>{
    const el=l.getElement(); if(el)el.classList.toggle('sel',n===nm);
    l.setStyle({fillOpacity:n===nm?.95:.5});
  });
  map.flyToBounds(layers[nm].getBounds(),{padding:[40,40],duration:.7,maxZoom:11});
  showIncidents(nm);
  const incs=DATA.incidents.filter(i=>i.k===nm).sort((a,b)=>a.time<b.time?1:-1);
  // type breakdown
  const counts={}; incs.forEach(i=>counts[i.type]=(counts[i.type]||0)+1);
  const maxc=Math.max(1,...Object.values(counts));
  const bars=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`
    <div class="bar"><span class="bt">${t}</span>
      <span class="track"><span class="fill" style="width:${100*c/maxc}%"></span></span>
      <span class="bn">${c}</span></div>`).join('') || `<div class="empty">Ingen hændelser registreret.</div>`;
  const list=incs.map(i=>`
    <div class="inc"><span class="sev" style="background:${SEVCOL[i.sev]}"></span>
      <div><div class="it">${i.type}</div><div class="iw">${i.vej}, ${i.by}</div></div>
      <div class="tm">${i.time}</div></div>`).join('')
    || `<div class="empty">Stille hele døgnet — ingen anmeldelser.</div>`;
  const trend = k.z==null ? 'baseline ikke moden endnu'
    : (k.z<0 ? `${Math.abs(k.z).toFixed(1)}σ under normal` : `${k.z.toFixed(1)}σ over normal`);
  const kseries=DATA.series[nm];
  const ns=k.n_samples||0, win=DATA.window_weeks||8;
  const mat=Math.min(1,ns/win), matlab=k.mature?'baseline moden':'indsamler baseline';
  panel.innerHTML=`
    <div class="back" id="back">‹ Tilbage til oversigt</div>
    <div class="gauge">${ring(k.score)}
      <div class="meta"><div class="lab">${nm.toUpperCase()}</div>
        <div class="big">${moodWord(k.score)}</div>
        <div class="small">${trend}</div></div></div>
    <div class="stat-line"><b>${k.n}</b> hændelser i dag · forventet ~<b>${k.expected==null?'—':Math.round(k.expected/2.4)}</b> · alvorsvægt <b>${k.wsum}</b></div>
    <div class="eyebrow">Ro-score · seneste ${kseries.length} døgn</div>
    <div class="trend"><div class="tlab"><span>travlt 0</span><span>normalområde</span><span>100 roligt</span></div>${trendChart(kseries)}</div>
    <div class="matur"><span>${matlab}</span><span class="pill"><span class="pf" style="width:${mat*100}%"></span></span><span>${ns}/${win} obs</span></div>
    <div class="eyebrow">Fordeling på type</div>${bars}
    <div class="eyebrow" style="margin-top:16px">Hændelser · ${incs.length}</div>${list}`;
  document.getElementById('back').onclick=renderOverview;
}

/* ---------- footer scale + date ---------- */
function renderFooter(){
  document.getElementById('datestr').textContent=DATA.date+' · seneste døgn';
  document.getElementById('freshtag').textContent='OPDATERET '+DATA.date;
  const sc=document.getElementById('scale'); sc.innerHTML='<span class="sl">travlt</span>';
  [8,28,50,72,95].forEach(s=>{const d=document.createElement('span');d.className='sw';d.style.background=scoreColor(s);sc.appendChild(d);});
  const e=document.createElement('span');e.className='sl';e.style.margin='0 0 0 8px';e.textContent='roligt';sc.appendChild(e);
}

async function init(){
  panel.innerHTML='<div class="empty">Henter data …</div>';
  try{
    const res=await fetch('./daily_scores.json',{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA=await res.json();
  }catch(err){
    panel.innerHTML=`<div class="empty">Kunne ikke hente daily_scores.json (${err.message}).<br><br>Filen skal serveres over HTTP — åbn ikke via file://. Kør fx <b>python -m http.server</b> i web-mappen.</div>`;
    return;
  }
  const cent={}; GEO.features.forEach(f=>cent[f.properties.name]=f.properties);
  DATA.kommuner.forEach(k=>{const c=cent[k.name]; if(c){k.cx=c.cx; k.cy=c.cy;}});
  DATA.kommuner.forEach(k=>byName[k.name]=k);
  buildGeoLayer(); drawLabels(); renderFooter(); renderOverview();
}
init();
</script>
